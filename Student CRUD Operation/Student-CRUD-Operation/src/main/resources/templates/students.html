<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>All Students</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    /* Background */
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1d2671, #c33764);
        color: #ffffff;
    }

    /* Navbar */
    .navbar {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        background: rgba(0,0,0,0.4);
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }

    /* Header */
    .container {
        text-align: center;
        margin-top: 30px;
    }

    /* Table Container */
    .table-container {
        width: 85%;
        margin: 40px auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        color: black;   /* 🔥 IMPORTANT FIX */
    }

    /* Header */
    th {
        background: #1d2671;
        color: white;
        padding: 12px;
    }

    /* Rows */
    td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
    }

    /* Alternating rows */
    tr:nth-child(even) {
        background: #f2f2f2;
    }

    /* Hover */
    tr:hover {
        background: #dbe9ff;
    }

    /* Buttons */
    .btn {
        padding: 6px 12px;
        border-radius: 6px;
        text-decoration: none;
        color: white;
        font-size: 13px;
    }

    .edit {
        background: #007bff;
    }

    .delete {
        background: #dc3545;
    }

    /* Footer */
    .footer {
        text-align: center;
        margin-top: 30px;
        color: white;
    }
  </style>



</head>

<body>

<div class="navbar">
  <div class="logo">StudentMS</div>
  <div class="nav-links">
    <a href="/">Home</a>
  </div>
</div>

<div class="container">
  <h1>All Students</h1>
  <p>List of all registered students in the system</p>
</div>

<div class="table-container">

  <table>

    <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Branch</th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <!-- Loop through students -->
    <tr th:each="s : ${students}">
      <td th:text="${s.kodId}"></td>
      <td th:text="${s.name}"></td>
      <td th:text="${s.branch}"></td>

      <td>
        <!-- Future upgrade buttons -->
        <a href="#" class="btn edit">Edit</a>
        <a href="#" class="btn delete">Delete</a>
      </td>
    </tr>
    </tbody>


  </table>

</div>

<div class="footer">
  © 2026 Student Management System
</div>

</body>
</html>
